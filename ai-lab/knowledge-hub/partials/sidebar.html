      <span class="nav-icon">📊</span> Dashboard
    </div>
  </div>

  <div class="nav-section">
    <div class="nav-section-label">Knowledge</div>

    </div>
  </div>

  <div class="nav-section">
    <div class="nav-section-label">System</div>
    <div class="nav-item" data-view="toolkit" onclick="switchView('toolkit')">
      <span class="nav-icon">🗂️</span> Toolkit Explorer
    </div>

      <span class="nav-icon">⚙️</span> Settings

</nav>

  </div>
  <div id="sidebarUser" hidden class="sidebar-user">
    <span id="sidebarUserAvatar" class="user-avatar">T</span>
