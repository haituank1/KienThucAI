<!-- ══ QUEUE VIEW ════════════════════════════════════════════════════════════ -->
<div id="view-queue" style="display:none;flex:1;flex-direction:column;overflow:hidden">
  <div style="flex:1;overflow-y:auto;padding:1.25rem">

    <div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:1rem">
      <h2 style="margin:0;font-size:1rem;font-weight:600;color:#cbd5e1">📋 Research Queue</h2>
      <div id="queueStats" style="font-size:0.75rem;color:#64748b"></div>
      <div style="margin-left:auto;display:flex;gap:0.5rem">
        <button class="btn btn-ghost" onclick="loadQueue()">🔄 Refresh</button>
        <button class="btn btn-primary" onclick="openQueueModal()">+ Thêm Topic</button>
      </div>
    </div>

    <div style="display:flex;gap:0.25rem;margin-bottom:1rem">
      <button class="btn btn-ghost" id="qFilterAll"     onclick="setQueueFilter('all')"     style="font-size:0.75rem">Tất cả</button>
      <button class="btn btn-ghost" id="qFilterPending" onclick="setQueueFilter('pending')" style="font-size:0.75rem">⏳ Pending</button>
      <button class="btn btn-ghost" id="qFilterDone"    onclick="setQueueFilter('done')"    style="font-size:0.75rem">✅ Done</button>
    </div>

    <div class="card" style="padding:0;overflow:hidden">
      <table class="queue-table">
        <thead>
          <tr>
            <th style="width:80px">Priority</th>
            <th>Topic</th>
            <th style="width:110px">Category</th>
            <th style="width:90px">Status</th>
            <th style="width:80px">Added</th>
            <th style="width:160px">Actions</th>
          </tr>
        </thead>
        <tbody id="queueTableBody">
          <tr><td colspan="6" style="text-align:center;color:#64748b;padding:2rem">Đang tải...</td></tr>
        </tbody>
      </table>
    </div>

    <div style="margin-top:0.75rem;font-size:0.7rem;color:#64748b">
      💡 Click <strong>Generate Prompt</strong> để copy prompt nghiên cứu vào clipboard, rồi paste vào Claude.
    </div>
  </div>
</div>
