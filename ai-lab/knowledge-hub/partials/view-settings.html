<!-- ══ SETTINGS VIEW ════════════════════════════════════════════════════════ -->
<div id="view-settings" style="display:none;flex:1;flex-direction:column;overflow:hidden">
  <div style="flex:1;overflow-y:auto;padding:1.25rem">
    <div style="max-width:480px">

      <div class="card" style="margin-bottom:1rem">
        <div class="card-title" style="margin-bottom:1rem">📁 Categories</div>
        <div id="categoriesList" style="display:flex;flex-direction:column;gap:0.5rem;margin-bottom:1rem"></div>
        <button class="btn btn-ghost" style="font-size:0.75rem" onclick="openAddCategoryModal()">+ Thêm Category</button>
      </div>

      <div class="card" style="margin-bottom:1rem">
        <div class="card-title" style="margin-bottom:0.75rem">📋 Toolkit Index</div>
        <div id="indexInfo" style="font-size:0.75rem;color:#64748b;line-height:1.8;margin-bottom:0.75rem">Chưa load...</div>
        <button class="btn btn-primary" id="rebuildIndexBtn" onclick="rebuildToolkitIndex()"
                style="font-size:0.75rem;padding:0.35rem 0.75rem">
          🔄 Rebuild Index
        </button>
      </div>

      <div class="card" style="margin-bottom:1rem">
        <div class="card-title" style="margin-bottom:0.75rem">🚀 Session Starter</div>
        <p style="font-size:0.72rem;color:#64748b;margin:0 0 0.75rem;line-height:1.6">
          Generate context prompt từ toolkit để bắt đầu session mới với Claude.
        </p>
        <div style="display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap">
          <select id="sessionStarterType" class="input"
                  style="flex:1;min-width:120px;cursor:pointer;font-size:0.75rem;padding:0.3rem 0.5rem">
            <option value="debug">🐛 Debug / Troubleshoot</option>
            <option value="feature">✨ Feature Development</option>
            <option value="refactor">🔧 Refactoring</option>
            <option value="schema">🗄️ Schema Design</option>
          </select>
          <button class="btn btn-primary" onclick="generateSessionStarter()" id="sessionStarterBtn"
                  style="font-size:0.75rem;padding:0.35rem 0.75rem;white-space:nowrap">
            ⚡ Generate
          </button>
        </div>
        <div id="sessionStarterStatus" style="font-size:0.7rem;color:#64748b;margin-top:0.4rem"></div>
      </div>

      <div class="card">
        <div class="card-title" style="margin-bottom:0.75rem">🔧 System Info</div>
        <div id="systemInfo" style="font-size:0.75rem;color:#64748b;line-height:1.8"></div>
      </div>

    </div>
  </div>
</div>
