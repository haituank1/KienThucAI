<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knowledge Hub — AI Lab</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<!-- Prism.js syntax highlighting -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css">
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-csharp.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-sql.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-bash.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-json.min.js"></script>
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/features.css">
</head>
<body>

<!-- ══ LOGIN OVERLAY ════════════════════════════════════════════════════════ -->
<div id="loginOverlay" class="login-overlay">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">🧠</div>
      <div class="login-logo-title">Knowledge Hub</div>
      <div class="login-logo-sub">AI Lab — Personal</div>
    </div>
    <div class="login-form">
      <div class="login-field">
        <label class="login-label">Username</label>
        <input id="loginUsername" class="login-input" type="text" placeholder="username"
               autocomplete="username"
               onkeydown="if(event.key==='Enter')document.getElementById('loginPassword').focus()">
      </div>
      <div class="login-field">
        <label class="login-label">Password</label>
        <input id="loginPassword" class="login-input" type="password" placeholder="••••••••"
               autocomplete="current-password"
               onkeydown="if(event.key==='Enter')submitLogin()">
      </div>
      <div id="loginError" class="login-error" hidden></div>
      <button id="loginBtn" class="login-btn" onclick="submitLogin()">Đăng nhập</button>
    </div>
  </div>
</div>

<!-- ══ APP SHELL ════════════════════════════════════════════════════════════ -->
<div id="appShell" class="app-shell" style="display:none">
  <!-- Sidebar: content injected from partials/sidebar.html -->
  <aside id="sidebar" class="sidebar"></aside>
  <!-- Main area: views injected from partials/view-*.html -->
  <div id="mainArea" class="main-area"></div>
</div>

<!-- Modals: injected from partials/modals.html -->
<div id="modalsMount"></div>

<!-- ══ JS MODULES ════════════════════════════════════════════════════════════
     Load order: config → utils → api → auth → knowledge → detail →
                 merge → queue → toolkit → features → rating → init          -->
<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/knowledge.js"></script>
<script src="js/detail.js"></script>
<script src="js/merge.js"></script>
<script src="js/queue.js"></script>
<script src="js/toolkit.js"></script>
<script src="js/features.js"></script>
<script src="js/rating.js"></script>
<script src="js/init.js"></script>
</body>
</html>
